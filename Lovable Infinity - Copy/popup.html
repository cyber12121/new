<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lovable Infinity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">

    <!-- ── Header ── -->
    <header class="hdr">
      <div class="hdr-brand">
        <div class="logo-tile">∞</div>
        <div class="brand-text">
          <span class="brand-name">Lovable Infinity</span>
          <span class="brand-sub">LICENSE MANAGER</span>
        </div>
      </div>
      <div class="status-pill" id="statusPill">
        <span class="dot"></span>
        <span id="statusText">Not activated</span>
      </div>
    </header>

    <!-- ── License Card ── -->
    <section class="card" id="licenseCard">
      <label class="field-label">LICENSE KEY</label>
      <div class="input-row">
        <input
          type="text"
          id="licenseKey"
          class="key-input"
          placeholder="LI-XXXXXXXX-XXXX-XXXX-XXXX"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="activateBtn" class="btn-activate">Activate</button>
      </div>
      <div class="hint-row">
        <span class="hint-text" id="hintText">Enter your license key to activate</span>
        <a href="https://lovableinfy.lovable.app" target="_blank" class="dash-link">Open Dashboard ↗</a>
      </div>
    </section>

    <!-- ── Plan Card ── -->
    <section class="card plan-card" id="planCard" style="display:none">
      <div class="plan-head">
        <div class="plan-title-block">
          <span class="plan-name" id="planName">—</span>
          <span class="plan-type-label" id="planTypeLabel"></span>
        </div>
        <span class="plan-badge" id="planBadge">—</span>
      </div>

      <ul class="metrics" id="metricsList"></ul>

      <div class="bar-wrap" id="barWrap" style="display:none">
        <div class="bar-track">
          <div class="bar-fill" id="barFill" style="width:0%"></div>
        </div>
        <div class="bar-meta">
          <span id="planBarLeft"></span>
          <span id="planBarRight"></span>
        </div>
      </div>
    </section>

    <!-- ── Expiry Row ── -->
    <div class="expiry-row" id="expiryRow" style="display:none">
      <span class="expiry-icon">📅</span>
      <span id="expiryText" class="expiry-text">—</span>
    </div>

    <!-- ── Footer ── -->
    <footer class="footer">LOVABLE INFINITY · SECURE LICENSING</footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
