<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lovable Infinity</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    body {
      width: 340px;
      padding: 20px;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--ql-bg);
      color: var(--ql-text-primary);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .header img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
      font-family: 'Outfit', system-ui, sans-serif;
    }

    .status-card {
      background: var(--ql-bg-surface);
      border: 1px solid var(--ql-border);
      border-radius: var(--ql-radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .status-active {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--ql-success);
      font-weight: 600;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--ql-success);
      box-shadow: 0 0 8px var(--ql-success);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
    }

    .info-label {
      color: var(--ql-text-secondary);
    }

    .info-value {
      color: var(--ql-text-primary);
      font-weight: 500;
    }

    .badge {
      background: var(--ql-accent-subtle);
      color: var(--ql-accent);
      padding: 2px 10px;
      border-radius: var(--ql-radius-pill);
      font-size: 12px;
      font-weight: 600;
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: var(--ql-text-muted);
      margin-top: 16px;
    }
  </style>
</head>

<body>
  <div class="header">
    <img src="assets/icon128.png" alt="Logo" />
    <h1>Lovable Infinity</h1>
    <span class="badge">Patched</span>
  </div>

  <div class="status-card">
    <div class="status-active">
      <div class="status-dot"></div>
      <span>License Active</span>
    </div>
    <div class="info-row">
      <span class="info-label">Status</span>
      <span class="info-value">Unlimited</span>
    </div>
    <div class="info-row">
      <span class="info-label">Tier</span>
      <span class="info-value">Pro</span>
    </div>
    <div class="info-row">
      <span class="info-label">Device Tracking</span>
      <span class="info-value" style="color: var(--ql-text-muted);">Disabled</span>
    </div>
  </div>

  <div style="font-size: 13px; color: var(--ql-text-secondary); text-align: center;">
    Extension is fully operational on lovable.dev
  </div>

  <div class="footer">
    Lovable Infinity · Patched Build
  </div>
</body>

</html>
