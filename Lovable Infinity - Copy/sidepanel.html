<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loveable Infinity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="sp-header">
    <div class="sp-header-left">
      <div class="sp-brand">
        <img class="sp-brand-logo" src="assets/icon.jpg" alt="Lovable Infinity">
        <span class="sp-brand-text">Lovable Infinity</span>
        <span class="sp-badge">PRO</span>
      </div>
    </div>
    <div class="sp-header-actions">
      <button class="sp-icon-btn sp-notif-btn" title="Notifications">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="sp-notif-badge" style="display:none">0</span>
      </button>
      <button class="sp-icon-btn sp-theme-btn" title="Toggle theme">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="sp-icon-btn sp-logout-btn" title="Logout" style="display: none !important;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
  
  <div class="sp-body" id="sp-body">
    <div class="sp-license-gate" id="sp-loading" style="padding:40px 0;text-align:center">
      <div class="sp-loading-spinner"></div>
      <p style="color:var(--ql-text-muted);margin-top:12px;font-size:13px">Loading...</p>
    </div>
  </div>

  <div class="sp-footer">
    <button class="sp-back-to-popup" id="sp-back-to-popup" title="Return to floating mode" style="display:none">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Popup
    </button>
    <div class="sp-footer-badges">
      <span class="sp-footer-badge" id="sp-footer-version"></span>
      <span class="sp-footer-badge sp-footer-badge-ok" id="sp-footer-connection">Connected</span>
    </div>
  </div>

  <div class="sp-notif-panel" id="sp-notif-panel" style="display:none">
    <div class="sp-notif-header">
      <span>Notifications</span>
      <button class="sp-notif-close" id="sp-notif-close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sp-notif-list" id="sp-notif-list">
      <p class="sp-notif-empty">Loading...</p>
    </div>
  </div>

  <script src="extension-config.js"></script>
  <script src="lovable-auth.js"></script>
  <script src="lovable-feature-api.js"></script>
  <script src="user-messages.js"></script>
  <script src="jszip.min.js"></script>
  <script src="hwFingerprint.js"></script>
  <script src="license-v2.js"></script>
  <script src="license-guard.js"></script>
  <script src="sidepanel-templates.js"></script>
  <script src="sounds.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
